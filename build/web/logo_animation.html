<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYFLIX - Logo Design System & Motion Study</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background glow */
    .ambient-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(229, 9, 20, 0.08) 0%, rgba(5, 5, 5, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Logo Wrapper */
    .logo-container {
      width: 240px;
      height: 240px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
    }

    /* Brand Typography */
    .brand-name {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #ffffff;
      display: flex;
      justify-content: center;
    }

    .brand-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
    }

    .brand-char.accent {
      color: #FF3B40; /* Vibrant Netflix Red */
    }

    .tagline {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #666666;
      opacity: 0;
      transform: translateY(10px);
      margin-bottom: 48px;
    }

    /* Controls */
    .btn-replay {
      background-color: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
    }

    .btn-replay:hover {
      background-color: #ffffff;
      color: #050505;
      border-color: #ffffff;
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
    }

    .btn-replay:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>

  <div class="container">
    <div class="logo-container">
      <svg class="logo-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Left Leg Gradient -->
          <linearGradient id="leftLegGrad" x1="40" y1="30" x2="68" y2="170" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#E50914" />
            <stop offset="100%" stop-color="#7A0005" />
          </linearGradient>

          <!-- Right Leg Gradient -->
          <linearGradient id="rightLegGrad" x1="132" y1="30" x2="160" y2="170" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FF3B40" />
            <stop offset="100%" stop-color="#9A000A" />
          </linearGradient>

          <!-- Play Button Gradient -->
          <linearGradient id="playGrad" x1="82" y1="60" x2="126" y2="140" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FF5A5F" />
            <stop offset="100%" stop-color="#B80009" />
          </linearGradient>

          <!-- Silver Light Sweep Overlay -->
          <linearGradient id="silverSweep" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)" />
            <stop offset="30%" stop-color="rgba(255,255,255,0)" />
            <stop offset="50%" stop-color="rgba(255,255,255,0.4)" />
            <stop offset="70%" stop-color="rgba(255,255,255,0)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </linearGradient>

          <!-- Glow Filter -->
          <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- Connection Bridge (scaled horizontally) -->
        <rect id="bridge" x="68" y="92" width="14" height="16" rx="2" fill="#9A000A" />

        <!-- Left Leg -->
        <rect id="left-leg" x="40" y="30" width="28" height="140" rx="8" fill="url(#leftLegGrad)" />

        <!-- Right Leg -->
        <rect id="right-leg" x="132" y="30" width="28" height="140" rx="8" fill="url(#rightLegGrad)" />

        <!-- Play Button (Center Triangle) -->
        <path id="play-button" d="M 82 60 L 82 140 L 126 100 Z" fill="url(#playGrad)" filter="url(#neonGlow)" />
        
        <!-- Light Sweep Masked Layer -->
        <g mask="url(#logoMask)">
          <!-- Add clipping path or copy shape for sweep effect if needed. Simplified sweep is handled via opacity of a bright copy. -->
        </g>
      </svg>
    </div>

    <!-- Letter by letter brand name for staggered GSAP text anim -->
    <h1 class="brand-name" id="brandName">
      <span class="brand-char">H</span>
      <span class="brand-char">Y</span>
      <span class="brand-char accent">F</span>
      <span class="brand-char accent">L</span>
      <span class="brand-char accent">I</span>
      <span class="brand-char accent">X</span>
    </h1>

    <p class="tagline" id="tagline">The Cinematic Stream</p>

    <button class="btn-replay" id="btnReplay">Study Motion</button>
  </div>

  <script>
    // Register GSAP timeline
    const tl = gsap.timeline({
      defaults: { ease: "power4.out" }
    });

    function runAnimation() {
      // Reset state
      tl.clear();
      
      gsap.set("#left-leg", { y: -220, opacity: 0 });
      gsap.set("#right-leg", { y: 220, opacity: 0 });
      gsap.set("#bridge", { scaleX: 0, transformOrigin: "left center" });
      gsap.set("#play-button", { scale: 0, opacity: 0, transformOrigin: "center center" });
      gsap.set(".brand-char", { y: 30, opacity: 0 });
      gsap.set("#tagline", { y: 15, opacity: 0 });
      gsap.set("#btnReplay", { opacity: 0 });

      // Motion Choreography
      tl.to("#left-leg", {
        y: 0,
        opacity: 1,
        duration: 1.2,
        ease: "power4.inOut"
      })
      .to("#right-leg", {
        y: 0,
        opacity: 1,
        duration: 1.2,
        ease: "power4.inOut"
      }, "-=1.0")
      .to("#bridge", {
        scaleX: 1,
        duration: 0.4,
        ease: "power2.out"
      }, "-=0.2")
      .to("#play-button", {
        scale: 1,
        opacity: 1,
        duration: 0.8,
        ease: "elastic.out(1, 0.6)"
      }, "-=0.2")
      .to(".brand-char", {
        y: 0,
        opacity: 1,
        duration: 0.8,
        stagger: 0.08,
        ease: "power3.out"
      }, "-=0.4")
      .to("#tagline", {
        y: 0,
        opacity: 1,
        duration: 0.8,
        ease: "power2.out"
      }, "-=0.6")
      .to("#btnReplay", {
        opacity: 1,
        duration: 0.6
      }, "-=0.2");
    }

    // Bind event
    document.getElementById("btnReplay").addEventListener("click", runAnimation);

    // Run on boot
    window.addEventListener("load", () => {
      // Add slight delay for premium loading experience
      setTimeout(runAnimation, 400);
    });
  </script>
</body>
</html>
