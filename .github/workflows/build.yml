name: Build HyFLIX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hyflix-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Enable macOS build
        run: flutter config --enable-macos-desktop
        
      - name: Build macOS App
        run: flutter build macos --release
        
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "HyFLIX" -srcfolder hyflix.app -ov -format UDZO HyFLIX.dmg
          
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: hyflix-macos-dmg
          path: build/macos/Build/Products/Release/HyFLIX.dmg
