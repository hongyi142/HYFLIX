    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #fff;
      --text-secondary: #808080;
      --text-muted: #555;
      --accent: #E50914;
      --accent-hover: #b2070f;
      --radius: 8px;

    @media (prefers-reduced-motion: reduce) {

        transition-duration: 0.01ms !important;
      }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;

      color: var(--text-primary);

      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;

    /* Ambient gradient backdrop */

    .nav-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.3px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .nav-logo span { color: var(--accent); }

    .nav-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--text-primary); }

    /* Hero */
    .hero {
      position: relative;
      min-height: 100dvh;

      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;

    .hero-eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      opacity: 0;
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 20px;
      opacity: 0;
    }

    .hero-title span { color: var(--accent); }

    .hero-sub {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 36px;
      opacity: 0;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      opacity: 0;

    .hero-cta:hover { background: var(--accent-hover); }
    .hero-cta:active { transform: scale(0.98); }

    .hero-cta svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
    }

    .scroll-indicator svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
    }

    /* Platform section */
    .platforms-section {
      position: relative;
      z-index: 1;

      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;

    /* Platform card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);

    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .card-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(229,9,20,0.08) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;

    .card:hover .card-glow { opacity: 1; }

    .card-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--text-primary);
    }

    .card-platform {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-file {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }

    .card-size {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
      opacity: 0.6;

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;

    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      cursor: not-allowed;

    .btn:disabled:hover { background: rgba(255,255,255,0.06); }

    .btn svg {

      height: 16px;

    .version-pill {

      align-items: center;
      gap: 6px;
      background: rgba(229,9,20,0.1);

    .version-dot {

      height: 6px;
      border-radius: 50%;
      background: var(--accent);

    /* Loading state */
    .loading-skeleton {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;

    .skel {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
      border-radius: 8px;
    }

    .skel-icon { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 20px; }
    .skel-text { height: 14px; margin-bottom: 8px; }
    .skel-text-sm { height: 12px; margin-bottom: 24px; opacity: 0.5; }
    .skel-btn { width: 100%; height: 44px; border-radius: var(--radius); }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: 60px 0;
      opacity: 0;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(229,9,20,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 28px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: rgba(229,9,20,0.08); }

    /* Footer */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;

    /* Responsive */
    @media (max-width: 768px) {

      .platforms-grid, .loading-skeleton { grid-template-columns: 1fr; max-width: 400px; }

    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .platforms-grid, .loading-skeleton { grid-template-columns: repeat(2, 1fr); max-width: 640px; }
    }
  </style>
</head>

    const downloadSvg = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>';

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    const CONFIG = {

    function renderCards(platforms) {
      const container = document.getElementById('content');
      const enabledPlatforms = PLATFORMS.filter(p => platforms[p.id]?.enabled);

      if (enabledPlatforms.length === 0) {
        renderError('No downloads available yet. Check back soon.');
        return;
      }

      let html = '<div class="platforms-grid">';
      enabledPlatforms.forEach(p => {
        const state = platforms[p.id];
        const fileName = state.fileName || '';
        const fileSize = formatSize(state.fileSize);
        const url = state.downloadUrl || '#';

        html += `
          <div class="card">
            <div class="card-glow"></div>
            <div class="card-icon">${p.icon}</div>
            <div class="card-platform">${p.name}</div>
            <div class="card-file">${fileName}</div>
            <div class="card-size">${fileSize || '&nbsp;'}</div>
            <a class="btn" href="${url}" target="_blank" rel="noopener">
              ${downloadSvg}
              Download
            </a>
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;

      if (!REDUCED) {
        gsap.fromTo('.card', { opacity: 0, y: 30 }, {
          opacity: 1, y: 0, duration: 0.6, stagger: 0.12,
          ease: 'power3.out',
          scrollTrigger: { trigger: '.platforms-grid', start: 'top 80%' }
        });

        gsap.fromTo('.version-pill', { opacity: 0, y: 10 }, {
          opacity: 1, y: 0, duration: 0.5, delay: 0.4, ease: 'power2.out',
          scrollTrigger: { trigger: '.version-pill', start: 'top 85%' }
        });
      } else {
        document.querySelectorAll('.card, .version-pill').forEach(el => {
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
      }
    }

    function renderError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="error-state">

          <div class="error-msg">${msg}</div>
          <button class="retry-btn" onclick="init()">Retry</button>

    function animateHero() {
      if (REDUCED) {
        document.querySelectorAll('.hero-eyebrow, .hero-title, .hero-sub, .hero-cta, .scroll-indicator').forEach(el => {
          el.style.opacity = '1';
        });
        return;
      }

      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
      tl.fromTo('.hero-eyebrow', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 })
        .fromTo('.hero-title', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.7 }, '-=0.3')
        .fromTo('.hero-sub', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 }, '-=0.35')
        .fromTo('.hero-cta', { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.5 }, '-=0.25')
        .fromTo('.scroll-indicator', { opacity: 0 }, { opacity: 0.5, duration: 0.8 }, '-=0.2');
    }

    async function fetchLatestRelease() {
      try {
        const response = await fetch('https://api.github.com/repos/hongyi142/HYFLIX/releases/latest');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        
        if (data.tag_name) {
          document.getElementById('versionText').textContent = data.tag_name;
        }

        const dynamicConfig = JSON.parse(JSON.stringify(CONFIG));

        if (data.assets && Array.isArray(data.assets)) {
          let foundAndroid = false;
          let foundAndroidTv = false;
          let foundWindows = false;
          let foundMacos = false;

          data.assets.forEach(asset => {
            const name = asset.name.toLowerCase();
            if (name.endsWith('.apk') && name.includes('android-tv')) {
              dynamicConfig['android-tv'].enabled = true;
              dynamicConfig['android-tv'].fileName = asset.name;
              dynamicConfig['android-tv'].fileSize = asset.size;
              dynamicConfig['android-tv'].downloadUrl = asset.browser_download_url;
              foundAndroidTv = true;
            } else if (name.endsWith('.apk') && name.includes('android')) {
              dynamicConfig.android.enabled = true;
              dynamicConfig.android.fileName = asset.name;
              dynamicConfig.android.fileSize = asset.size;
              dynamicConfig.android.downloadUrl = asset.browser_download_url;
              foundAndroid = true;
            } else if (name.endsWith('.zip') && name.includes('windows')) {
              dynamicConfig.windows.enabled = true;
              dynamicConfig.windows.fileName = asset.name;
              dynamicConfig.windows.fileSize = asset.size;
              dynamicConfig.windows.downloadUrl = asset.browser_download_url;
              foundWindows = true;
            } else if ((name.endsWith('.dmg') || name.endsWith('.pkg')) && name.includes('macos')) {
              dynamicConfig.macos.enabled = true;
              dynamicConfig.macos.fileName = asset.name;
              dynamicConfig.macos.fileSize = asset.size;
              dynamicConfig.macos.downloadUrl = asset.browser_download_url;
              foundMacos = true;
            }
          });

          if (foundAndroid || foundAndroidTv || foundWindows || foundMacos) {
            renderCards(dynamicConfig);
            return;
          }
        }
      } catch (e) {
        console.warn('Failed to fetch latest GitHub release, using hardcoded fallback:', e);
      }
      renderCards(CONFIG);
    }

    function init() {
      animateHero();
      fetchLatestRelease();
    }

    init();
  </script>
</body>
</html>
